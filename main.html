<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울산대학교 여운 동아리연합회</title>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        h1 { font-size: 22px; margin-bottom: 30px; color: #333; font-weight: bold; }
        .btn-container { width: 100%; max-width: 400px; }
        .btn { display: block; padding: 18px; margin-bottom: 15px; border-radius: 50px; text-align: center; text-decoration: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .dark-blue { background-color: #34495e; color: white; }
        .pink { background-color: #e91e63; color: white; }
        .yellow { background-color: #f1c40f; color: black; }
    </style>
</head>
<body>
    <h1>울산대학교 여운 동아리연합회</h1>
    <div class="btn-container">
        <a href="#" class="btn dark-blue">📢 전체 공지사항 확인</a>
        <a href="#" class="btn pink">📸 공식 인스타그램</a>
        <a href="#" class="btn yellow">💬 1:1 오픈채팅 문의</a>
        <a href="#" class="btn dark-blue">🎁 선착순 이벤트 신청하기</a>
    </div>
</body>
</html>
