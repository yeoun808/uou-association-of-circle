<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울산대학교 여운 동아리연합회</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; }
        
        .bg-container {
            /* 👇 깃허브에 올린 로고 파일명이 정확히 logo.png인지 확인 필수! */
            background-image: url('han.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            background-color: #f8f9fa; /* 로고 안 나올 때 대비한 배경색 */
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* 배경 반투명 처리 */
        .bg-container::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.7); z-index: 1;
        }

        .content {
            position: relative; z-index: 2;
            width: 90%; max-width: 400px; /* 요놈이 버튼 길이를 결정합니다 */
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 40px; color: #222; font-weight: bold; line-height: 1.4; }

        .btn { 
            display: block; 
            width: 100%; /* 버튼을 부모 너비에 꽉 채웁니다 */
            padding: 18px 0; 
            margin-bottom: 15px; 
            border-radius: 50px; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: all 0.2s; 
            border: none; 
            cursor: pointer;
            box-sizing: border-box; /* 패딩 때문에 버튼 삐져나가는거 방지 */
        }
        .btn:active { transform: scale(0.97); }

        /* 색상 코드 */
        .dark-blue { background-color: #34495e; color: white; }
        .pink { background-color: #e91e63; color: white; }
        .yellow { background-color: #f1c40f; color: black; }

        /* --- 섹션 전환 --- */
        #event-page { display: none; }
    </style>
</head>
<body>
    <div class="bg-container">
        <div id="main-menu" class="content">
            <h1>울산대학교 여운<br>동아리연합회</h1>
            <a href="#" class="btn dark-blue">📢 전체 공지사항 확인</a>
            <a href="#" class="btn pink">📸 공식 인스타그램</a>
            <a href="#" class="btn yellow">💬 1:1 오픈채팅 문의</a>
            <button onclick="showEvent()" class="btn dark-blue">🎁 선착순 이벤트 신청하기</button>
        </div>

        <div id="event-page" class="content">
            <h2 style="margin-bottom:30px;">준비 중...</h2>
            <button onclick="showMain()" class="btn">← 돌아가기</button>
        </div>
    </div>

    <script>
        function showEvent() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('event-page').style.display = 'block';
        }
        function showMain() {
            document.getElementById('event-page').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }
    </script>
</body>
</html>
