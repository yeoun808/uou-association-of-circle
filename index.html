<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울산대학교 여운 동아리연합회</title>
    <style>
        /* 전체 배경 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Pretendard', sans-serif;
        }

        .bg-container {
            /* 1. 배경 이미지 설정 */
            background-image: url('han.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-color: #f0f2f5; /* 로고 뒤 기본 배경색 */
            
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 2. 반투명 덮개 (Overlay) */
        .bg-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.5); /* 흰색 반투명 (0.6이 투명도) 0.1에 가까울 수록 로고가 진하게 보입니다. */
            /* 배경을 어둡게 하고 싶으면 rgba(0, 0, 0, 0.4) 정도로 바꾸세요 */
            z-index: 1;
        }

        /* 콘텐츠가 덮개 위에 오도록 설정 */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 24px; margin-bottom: 40px; color: #222; font-weight: 800; }

        .btn { 
            display: block; padding: 20px; margin-bottom: 18px; border-radius: 50px; 
            text-align: center; text-decoration: none; font-weight: bold; font-size: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.2s;
            border: none;
        }
        .btn:active { transform: scale(0.96); }

        /* 버튼 색상 (약간 더 쨍하게 수정) */
        .dark-blue { background-color: #34495e; color: white; }
        .pink { background-color: #e91e63; color: white; }
        .yellow { background-color: #f1c40f; color: black; }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="content">
            <h1>울산대학교 여운 동아리연합회</h1>
            <div class="btn-container">
                <a href="#" class="btn dark-blue">📢 전체 공지사항 확인</a>
                <a href="#" class="btn pink">📸 공식 인스타그램</a>
                <a href="#" class="btn yellow">💬 1:1 오픈채팅 문의</a>
                <a href="#" id="event-btn" class="btn dark-blue">🎁 선착순 이벤트 신청하기</a>
            </div>
        </div>
    </div>
</body>
</html>
